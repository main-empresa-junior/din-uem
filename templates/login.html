{% extends "base.html" %}

{% block title %}Login | Din UEM{% endblock title %}

{% block extra_css %}
<link rel="stylesheet" href="{{ get_url(path='css/login.css') }}">
{% endblock extra_css %}

{% block content %}
<div class="form-section">
    <div class="form-card">
        <h2>Entrar</h2>
        <p class="form-card-sub">Acesse o portal com suas credenciais institucionais</p>
        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">E-mail Institucional</label>
                <input type="email" id="email" name="email" placeholder="exemplo@uem.br"
                       pattern="[a-zA-Z0-9._%+\-]+@uem\.br$"
                       title="Use seu e-mail institucional @uem.br"
                       required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="********"
                       minlength="8" required>
            </div>
            <button type="submit" class="btn-submit">Entrar no Sistema</button>
        </form>
        <p class="form-footer-text">Não tem conta? <a href="{{ get_url(path='@/registro/_index.md') }}">Cadastre-se aqui</a></p>
    </div>
</div>
{% endblock content %}
